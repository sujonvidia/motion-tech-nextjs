overwrite: true
schema:
  - "http://localhost:3000/shop-api"
  - 'type Query { generateBraintreeClientToken: String }'
config:
  scalars: {}
generates:
  src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
  src/generated/schema.graphql:
    plugins:
      - schema-ast
